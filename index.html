<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Chain ⚽</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="screen-home" class="screen active">
            <div class="logo">FOOTBALL<br>CHAIN</div>
            
            <input type="text" id="my-nickname" class="name-input" placeholder="Enter Your Nickname">

            <div class="menu-section">
                <h3>ONLINE PLAY</h3>
                <button class="btn" onclick="online.createRoom()">CREATE ROOM</button>
                <div class="join-row">
                    <input type="number" id="join-id" class="name-input" placeholder="4-Digit Code">
                    <button class="btn" onclick="online.joinRoom()">JOIN</button>
                </div>
                <p id="room-display"></p>
                <div id="lobby-list"></div>
                <button class="btn start-btn" id="start-online-btn" style="display:none;" onclick="online.broadcastStart()">START ONLINE MATCH</button>
            </div>

            <hr>

            <div class="menu-section">
                <h3>LOCAL PARTY</h3>
                <div id="local-names-container">
                    <input type="text" class="name-input local-name" placeholder="Player 1">
                </div>
                <button class="btn add-btn" onclick="ui.addNameField()">+ ADD PLAYER</button>
                <button class="btn start-btn" onclick="game.startLocal()">START LOCAL GAME</button>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div id="turn-status">READY?</div>
            <div id="game-feed"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type player or club..." autocomplete="off" list="player-list">
                <datalist id="player-list"></datalist>
                <button class="btn submit-btn" onclick="game.handleInput()">SUBMIT</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="overlay" style="display:none;">
        <div class="vic-content">
            <h1 id="winner-name">GAME OVER</h1>
            <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
